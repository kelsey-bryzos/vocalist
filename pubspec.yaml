name: vocalist
description: Voice-first note taking and task management
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # Supabase — auth, database, storage, realtime
  supabase_flutter: ^2.9.1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Audio recording
  record: ^5.2.0

  # HTTP client — used for fetching web blob URLs after recording
  http: ^1.4.0

  # Temp directory for audio files (mobile)
  path_provider: ^2.1.5

  # Date formatting
  intl: ^0.20.2

  # Audio playback — for playing back recorded audio files
  audioplayers: ^6.1.0

  # Google Fonts — runtime font loading (Rajdhani for display, Inter for body)
  google_fonts: ^6.2.1

  # Environment variables
  flutter_dotenv: ^5.2.1

  cupertino_icons: ^1.0.8
  pdf: ^3.12.0
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
  assets:
    - .env
